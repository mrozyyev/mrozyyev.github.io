media:
  input: public/assets/images
  output: /assets/images
  categories: [image]
  extensions: [png, jpg, jpeg, webp, svg, gif, ico]

settings:
  content:
    merge: true

content:
  - name: site-settings
    label: Site Settings
    type: file
    path: src/collections/site-settings.json
    format: json
    fields:
      - name: siteName
        label: Site Name
        type: string
      - name: siteTitle
        label: Site Title (browser tab)
        type: string
      - name: metaDescription
        label: Meta Description (SEO)
        type: text
      - name: author
        label: Author
        type: string
      - name: ogImage
        label: OG Image
        type: image
      - name: favicon
        label: Favicon
        type: string
      - name: heroGreeting
        label: Hero Greeting
        type: string
      - name: heroDescription
        label: Hero Description
        type: text
      - name: heroServices
        label: Hero Services List
        type: string
        list: true
      - name: nowText
        label: Now Status Text
        type: string
      - name: aboutTitle
        label: About Page Title
        type: string
      - name: aboutDescription
        label: About Page Description
        type: text
      - name: aboutBio
        label: About Bio
        type: text
      - name: connectText
        label: Let's Connect Text
        type: text
      - name: email
        label: Contact Email
        type: string
      - name: social
        label: Social Links
        type: object
        fields:
          - name: github
            label: GitHub URL
            type: string
          - name: linkedin
            label: LinkedIn URL
            type: string
          - name: instagram
            label: Instagram URL
            type: string
          - name: x
            label: X (Twitter) URL
            type: string

  - name: menu
    label: Navigation Menu
    type: file
    path: src/collections/menu.json
    format: json
    list: true
    fields:
      - name: name
        label: Label
        type: string
      - name: url
        label: URL
        type: string

  - name: posts
    label: Blog Posts
    type: collection
    path: src/content/post
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: string
      - name: dateFormatted
        label: Date
        type: string
      - name: layout
        type: string
        hidden: true
      - name: body
        label: Content
        type: rich-text

  - name: capabilities
    label: What I Do
    type: file
    path: src/collections/capabilities.json
    format: json
    list: true
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: tags
        label: Tool Tags
        type: string
        list: true

  - name: projects
    label: Projects
    type: file
    path: src/collections/projects.json
    format: json
    list: true
    fields:
      - name: name
        label: Project Name
        type: string
      - name: description
        label: Description
        type: text
      - name: image
        label: Preview Image
        type: image
        options:
          path: projects
      - name: url
        label: Project URL
        type: string

  - name: experiences
    label: Experiences
    type: file
    path: src/collections/experiences.json
    format: json
    list: true
    fields:
      - name: dates
        label: Dates
        type: string
      - name: role
        label: Role
        type: string
      - name: company
        label: Company
        type: string
      - name: description
        label: Description
        type: text
      - name: logo
        label: Company Logo
        type: image
        options:
          path: experiences

  - name: skills
    label: Skills
    type: file
    path: src/collections/skills.json
    format: json
    fields:
      - name: categories
        label: Skill Categories
        type: object
        list:
          collapsible:
            summary: "{label}"
        fields:
          - name: id
            label: ID
            type: string
          - name: label
            label: Label
            type: string
          - name: color
            label: Color
            type: string
          - name: active
            label: Active
            type: boolean
          - name: children
            label: Sub-categories
            type: object
            list:
              collapsible:
                summary: "{label}"
            fields:
              - name: id
                label: ID
                type: string
              - name: label
                label: Label
                type: string
              - name: color
                label: Color
                type: string
              - name: active
                label: Active
                type: boolean
              - name: children
                label: Skills
                type: object
                list:
                  collapsible:
                    summary: "{label}"
                fields:
                  - name: id
                    label: ID
                    type: string
                  - name: label
                    label: Label
                    type: string
                  - name: svg
                    label: Icon URL
                    type: string
                  - name: active
                    label: Active
                    type: boolean
